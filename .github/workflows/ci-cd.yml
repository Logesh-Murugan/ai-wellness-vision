name: AI Wellness Vision CI/CD

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11"]
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test_db
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      redis:
        image: redis:7
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Cache pip dependencies
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-
    
    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y ffmpeg libsndfile1
    
    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-cov pytest-asyncio
    
    - name: Run linting
      run: |
        pip install flake8 black isort
        flake8 src tests --count --select=E9,F63,F7,F82 --show-source --statistics
        black --check src tests
        isort --check-only src tests
    
    - name: Run security checks
      run: |
        pip install bandit safety
        bandit -r src/
        safety check
    
    - name: Run unit tests
      run: |
        python -m pytest tests/ -v --cov=src --cov-report=xml --cov-report=html --cov-fail-under=80
      env:
        DATABASE_URL: postgresql://postgres:postgres@localhost:5432/test_db
        REDIS_URL: redis://localhost:6379/0
        ENVIRONMENT: testing
    
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        file: ./coverage.xml
        flags: unittests
        name: codecov-umbrella

  build:
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    outputs:
      image-digest: ${{ steps.build.outputs.digest }}
      image-tags: ${{ steps.meta.outputs.tags }}
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    
    - name: Log in to Container Registry
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Extract metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
        tags: |
          type=ref,event=branch
          type=ref,event=pr
          type=sha,prefix={{branch}}-
          type=raw,value=latest,enable={{is_default_branch}}
    
    - name: Build and push Docker images
      id: build
      uses: docker/build-push-action@v5
      with:
        context: .
        target: production
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
        platforms: linux/amd64,linux/arm64
    
    - name: Build and push API service image
      uses: docker/build-push-action@v5
      with:
        context: .
        file: docker/Dockerfile.api
        push: true
        tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/api:${{ github.sha }},${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/api:latest
        cache-from: type=gha
        cache-to: type=gha,mode=max
    
    - name: Build and push Streamlit service image
      uses: docker/build-push-action@v5
      with:
        context: .
        file: docker/Dockerfile.streamlit
        push: true
        tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/streamlit:${{ github.sha }},${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/streamlit:latest
        cache-from: type=gha
        cache-to: type=gha,mode=max
    
    - name: Build and push Worker service image
      uses: docker/build-push-action@v5
      with:
        context: .
        file: docker/Dockerfile.worker
        push: true
        tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/worker:${{ github.sha }},${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/worker:latest
        cache-from: type=gha
        cache-to: type=gha,mode=max

  security-scan:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Run Trivy vulnerability scanner on main image
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
        format: 'sarif'
        output: 'trivy-results-main.sarif'
    
    - name: Run Trivy vulnerability scanner on API image
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/api:${{ github.sha }}
        format: 'sarif'
        output: 'trivy-results-api.sarif'
    
    - name: Run Trivy vulnerability scanner on Streamlit image
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/streamlit:${{ github.sha }}
        format: 'sarif'
        output: 'trivy-results-streamlit.sarif'
    
    - name: Run Trivy vulnerability scanner on Worker image
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/worker:${{ github.sha }}
        format: 'sarif'
        output: 'trivy-results-worker.sarif'
    
    - name: Upload Trivy scan results to GitHub Security tab
      uses: github/codeql-action/upload-sarif@v2
      with:
        sarif_file: 'trivy-results-main.sarif'
    
    - name: Upload API Trivy scan results
      uses: github/codeql-action/upload-sarif@v2
      with:
        sarif_file: 'trivy-results-api.sarif'
    
    - name: Upload Streamlit Trivy scan results
      uses: github/codeql-action/upload-sarif@v2
      with:
        sarif_file: 'trivy-results-streamlit.sarif'
    
    - name: Upload Worker Trivy scan results
      uses: github/codeql-action/upload-sarif@v2
      with:
        sarif_file: 'trivy-results-worker.sarif'

  deploy-staging:
    needs: [test, build, security-scan]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/develop'
    environment: staging
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up kubectl
      uses: azure/setup-kubectl@v3
      with:
        version: 'latest'
    
    - name: Configure kubectl
      run: |
        echo "${{ secrets.KUBE_CONFIG_STAGING }}" | base64 -d > kubeconfig
        export KUBECONFIG=kubeconfig
    
    - name: Deploy to staging
      run: |
        export KUBECONFIG=kubeconfig
        # Update image tags in Kubernetes manifests
        sed -i "s|ghcr.io/ai-wellness-vision/api:latest|${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/api:${{ github.sha }}|g" k8s/ai-wellness-app.yaml
        sed -i "s|ghcr.io/ai-wellness-vision/streamlit:latest|${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/streamlit:${{ github.sha }}|g" k8s/ai-wellness-app.yaml
        sed -i "s|ghcr.io/ai-wellness-vision/worker:latest|${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/worker:${{ github.sha }}|g" k8s/ai-wellness-app.yaml
        
        # Apply Kubernetes manifests
        kubectl apply -f k8s/ -n ai-wellness-staging
        
        # Wait for deployments to be ready
        kubectl rollout status deployment/ai-wellness-api -n ai-wellness-staging --timeout=300s
        kubectl rollout status deployment/ai-wellness-streamlit -n ai-wellness-staging --timeout=300s
        kubectl rollout status deployment/ai-wellness-worker -n ai-wellness-staging --timeout=300s
    
    - name: Run deployment tests
      run: |
        export KUBECONFIG=kubeconfig
        kubectl run test-pod --image=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }} --rm -i --restart=Never -n ai-wellness-staging -- python -m pytest tests/test_deployment.py

  deploy-production:
    needs: [test, build, security-scan]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    environment: production
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up kubectl
      uses: azure/setup-kubectl@v3
      with:
        version: 'latest'
    
    - name: Configure kubectl
      run: |
        echo "${{ secrets.KUBE_CONFIG_PRODUCTION }}" | base64 -d > kubeconfig
        export KUBECONFIG=kubeconfig
    
    - name: Deploy to production
      run: |
        export KUBECONFIG=kubeconfig
        # Update image tags in Kubernetes manifests
        sed -i "s|ghcr.io/ai-wellness-vision/api:latest|${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/api:${{ github.sha }}|g" k8s/ai-wellness-app.yaml
        sed -i "s|ghcr.io/ai-wellness-vision/streamlit:latest|${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/streamlit:${{ github.sha }}|g" k8s/ai-wellness-app.yaml
        sed -i "s|ghcr.io/ai-wellness-vision/worker:latest|${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/worker:${{ github.sha }}|g" k8s/ai-wellness-app.yaml
        
        # Apply Kubernetes manifests
        kubectl apply -f k8s/ -n ai-wellness-vision
        
        # Wait for deployments to be ready
        kubectl rollout status deployment/ai-wellness-api -n ai-wellness-vision --timeout=600s
        kubectl rollout status deployment/ai-wellness-streamlit -n ai-wellness-vision --timeout=600s
        kubectl rollout status deployment/ai-wellness-worker -n ai-wellness-vision --timeout=600s
    
    - name: Run smoke tests
      run: |
        export KUBECONFIG=kubeconfig
        kubectl run smoke-test --image=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }} --rm -i --restart=Never -n ai-wellness-vision -- python -m pytest tests/test_smoke.py
    
    - name: Notify deployment
      uses: 8398a7/action-slack@v3
      with:
        status: ${{ job.status }}
        channel: '#deployments'
        webhook_url: ${{ secrets.SLACK_WEBHOOK }}
      if: always()