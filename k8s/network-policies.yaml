apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: ai-wellness-api-netpol
  namespace: ai-wellness-vision
spec:
  podSelector:
    matchLabels:
      app: ai-wellness-api
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - from:
    - podSelector:
        matchLabels:
          app: nginx-ingress
    - podSelector:
        matchLabels:
          app: ai-wellness-streamlit
    ports:
    - protocol: TCP
      port: 8000
  egress:
  - to:
    - podSelector:
        matchLabels:
          app: postgres
    ports:
    - protocol: TCP
      port: 5432
  - to:
    - podSelector:
        matchLabels:
          app: redis
    ports:
    - protocol: TCP
      port: 6379
  - to: []  # Allow external API calls
    ports:
    - protocol: TCP
      port: 443
    - protocol: TCP
      port: 80
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: ai-wellness-streamlit-netpol
  namespace: ai-wellness-vision
spec:
  podSelector:
    matchLabels:
      app: ai-wellness-streamlit
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - from:
    - podSelector:
        matchLabels:
          app: nginx-ingress
    ports:
    - protocol: TCP
      port: 8501
  egress:
  - to:
    - podSelector:
        matchLabels:
          app: ai-wellness-api
    ports:
    - protocol: TCP
      port: 8000
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: ai-wellness-worker-netpol
  namespace: ai-wellness-vision
spec:
  podSelector:
    matchLabels:
      app: ai-wellness-worker
  policyTypes:
  - Egress
  egress:
  - to:
    - podSelector:
        matchLabels:
          app: postgres
    ports:
    - protocol: TCP
      port: 5432
  - to:
    - podSelector:
        matchLabels:
          app: redis
    ports:
    - protocol: TCP
      port: 6379
  - to: []  # Allow external API calls for AI models
    ports:
    - protocol: TCP
      port: 443
    - protocol: TCP
      port: 80