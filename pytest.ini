[tool:pytest]
# pytest configuration for AI WellnessVision

# Test discovery
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Output options
addopts = 
    --verbose
    --tb=short
    --strict-markers
    --strict-config
    --cov=src
    --cov-report=html:htmlcov
    --cov-report=term-missing
    --cov-report=xml
    --cov-fail-under=80
    --durations=10
    --html=reports/pytest_report.html
    --self-contained-html

# Markers
markers =
    unit: Unit tests
    integration: Integration tests
    performance: Performance tests
    multilingual: Multilingual functionality tests
    accessibility: Accessibility compliance tests
    security: Security tests
    slow: Slow running tests
    api: API tests
    ui: User interface tests
    services: AI services tests

# Minimum version
minversion = 7.0

# Test timeout (in seconds)
timeout = 300

# Asyncio configuration
asyncio_mode = auto

# Warnings
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
    ignore::UserWarning:streamlit.*
    ignore::UserWarning:tensorflow.*
    ignore::UserWarning:torch.*

# Coverage configuration
[coverage:run]
source = src
omit = 
    */tests/*
    */test_*
    */__pycache__/*
    */venv/*
    */.venv/*
    */migrations/*
    */settings/*
    */manage.py
    */wsgi.py
    */asgi.py

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    if self.debug:
    if settings.DEBUG
    raise AssertionError
    raise NotImplementedError
    if 0:
    if __name__ == .__main__.:
    class .*\bProtocol\):
    @(abc\.)?abstractmethod

show_missing = True
precision = 2

[coverage:html]
directory = htmlcov
title = AI WellnessVision Test Coverage Report